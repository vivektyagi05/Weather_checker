<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(to bottom right, #0f2027, #203a43, #2c5364);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .weather-card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 30px;
      width: 400px;
      max-width: 90%;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      text-align: center;
    }
    .search-box {
      display: flex;
      justify-content: space-between;
      margin-bottom: 25px;
      gap: 10px;
    }
    .search-box input {
      flex: 1;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }
    .search-box button {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: #1e90ff;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
      font-weight: 600;
    }
    .search-box button:hover {
      background: #0077ff;
    }
    .city {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .date {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 10px;
    }
    .temp {
      font-size: 60px;
      font-weight: bold;
      margin: 10px 0;
    }
    .desc {
      font-size: 18px;
      text-transform: capitalize;
      margin-bottom: 20px;
    }
    .details {
      font-size: 14px;
      line-height: 1.8;
      text-align: left;
      margin-top: 15px;
    }
    .icon img {
      width: 80px;
    }
    .loading {
      font-size: 16px;
      opacity: 0.8;
    }
    .error {
      color: #ff6961;
      font-size: 16px;
      margin-top: 10px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="weather-card">
    <h2>🌍 Live Weather Finder</h2>
    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Enter city (e.g. Delhi, India)" />
      <button onclick="getWeather()">Search</button>
    </div>

    <p id="statusMsg" class="loading"></p>

    <div id="weatherInfo" style="display:none;">
      <p class="city">--</p>
      <p class="date">--</p>
      <div class="icon"></div>
      <p class="temp">--°C</p>
      <p class="desc">--</p>
      <div class="details">
        <p>Feels like: --°C</p>
        <p>Humidity: --%</p>
        <p>Wind: -- km/h</p>
      </div>
    </div>
  </div>

  <script>
    const apiKey = process.env.WEATHER_API_KEY || "YOUR_LOCAL_TEST_KEY";

    async function getWeather() {
      const cityInput = document.getElementById("cityInput");
      const city = cityInput.value.trim();
      const statusMsg = document.getElementById("statusMsg");
      const weatherBox = document.getElementById("weatherInfo");

      if (!city) {
        statusMsg.textContent = "⚠️ Please enter a city name.";
        weatherBox.style.display = "none";
        return;
      }

      statusMsg.textContent = "⏳ Fetching weather data...";
      weatherBox.style.display = "none";

      const encodedCity = encodeURIComponent(city);
      const url = `https://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${encodedCity}&aqi=yes`;

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error("City not found or API error");
        const data = await res.json();

        displayWeather(data);
        statusMsg.textContent = "";
        weatherBox.style.display = "block";
      } catch (err) {
        weatherBox.style.display = "none";
        statusMsg.innerHTML = `<span class="error">❌ ${err.message}</span>`;
      }
    }

    function displayWeather(data) {
      document.querySelector(".city").textContent = `${data.location.name}, ${data.location.country}`;
      document.querySelector(".date").textContent = new Date().toLocaleString();
      document.querySelector(".temp").textContent = `${data.current.temp_c}°C`;
      document.querySelector(".desc").textContent = data.current.condition.text;
      document.querySelector(".icon").innerHTML = `<img src="https:${data.current.condition.icon}" alt="icon" />`;
      document.querySelector(".details").innerHTML = `
        <p>Feels like: ${data.current.feelslike_c}°C</p>
        <p>Humidity: ${data.current.humidity}%</p>
        <p>Wind: ${data.current.wind_kph} km/h</p>
      `;
    }
  </script>
</body>
</html>
